services:
  # ── WEB SERVER (Public Web Service - FREE TIER) ──
  - type: web
    name: mensa-web
    env: docker
    rootDir: .
    plan: free
    envVars:
      # We will securely inject these from your external DB later
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false