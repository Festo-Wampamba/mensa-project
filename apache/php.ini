display_errors        = On
log_errors            = On
error_log             = /var/log/apache2/php_errors.log
error_reporting       = E_ALL
expose_php            = Off
memory_limit          = 128M
max_execution_time    = 30
upload_max_filesize   = 10M
post_max_size         = 12M
date.timezone         = Africa/Kampala
session.cookie_httponly = 1
session.use_strict_mode = 1
