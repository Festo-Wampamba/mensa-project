# MENSA Infrastructure - Apache VirtualHost
# Author : Wampamba Festo (Lead Software Engineer & Architect)

<VirtualHost *:80>
    ServerName bbcmensa.com
    ServerAlias www.bbcmensa.com
    DocumentRoot /var/www/bbcmensa.com

    <Directory /var/www/bbcmensa.com>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct browser access to the DB credentials file
    <Files "db_connect.php">
        Require all denied
    </Files>

    ErrorLog ${APACHE_LOG_DIR}/mensa_error.log
    CustomLog ${APACHE_LOG_DIR}/mensa_access.log combined
</VirtualHost>

